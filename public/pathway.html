// ---------- Rotation helper (stable per key) ----------
function rot(key) {
  if (state.rotations[key] == null) {
    state.rotations[key] = (Math.random() * 3 - 1.5);
  }
  return state.rotations[key];
}

// Stable random rotation in [min, max] range, persisted per key
function rotCustom(key, min, max) {
  if (state.rotations[key] == null) {
    state.rotations[key] = min + Math.random() * (max - min);
  }
  return state.rotations[key];
}

// ---------- perfect-freehand red-ink helpers ----------
const PF = window; // getStroke is global as `getStroke`
function pfPath(points, opts = {}) {
  const stroke = getStroke(points, {
    size: opts.size || 3.5,
    thinning: opts.thinning ?? 0.55,
    smoothing: 0.6,
    streamline: 0.55,
    easing: (t) => t,
    simulatePressure: true,
    last: true,
    start: { taper: opts.startTaper ?? 12, cap: true },
    end:   { taper: opts.endTaper ?? 18,   cap: true },
  });
  if (!stroke.length) return '';
  const d = stroke.reduce((acc, [x, y], i, arr) => {
    if (i === 0) return `M ${x.toFixed(2)} ${y.toFixed(2)}`;
    return acc + ` L ${x.toFixed(2)} ${y.toFixed(2)}`;
  }, '');
  return d + ' Z';
}

// Hand-drawn underline: wobbly line with optional double stroke
function freehandUnderline(w, { double = false, seed = 1 } = {}) {
  const rng = seededRng(seed);
  const pts = [];
  const steps = Math.max(20, Math.floor(w / 8));
  for (let i = 0; i <= steps; i++) {
    const x = (i / steps) * w;
    const y = 6 + (rng() - 0.5) * 1.6 + Math.sin(i * 0.7) * 0.6;
    const p = Math.max(0.25, 1 - Math.abs(i/steps - 0.5) * 1.4);
    pts.push([x, y, p]);
  }
  let svg = `<path d="${pfPath(pts, { size: 3.2, startTaper: 20, endTaper: 28 })}" fill="#c94c3a"/>`;
  if (double) {
    const pts2 = pts.map(([x, y, p]) => [x + (rng()-0.5)*2, y + 5 + (rng()-0.5)*1.2, p]);
    svg += `<path d="${pfPath(pts2, { size: 2.8, startTaper: 16, endTaper: 22 })}" fill="#c94c3a"/>`;
  }
  return svg;
}

// Circle drawn around text (one loose freehand loop)
function freehandCircle(w, h, seed = 1) {
  const rng = seededRng(seed);
  const cx = w/2, cy = h/2;
  const rx = w/2 - 4, ry = h/2 - 4;
  const pts = [];
  const turns = 1.05;
  const steps = 80;
  const startA = rng() * Math.PI * 2;
  for (let i = 0; i <= steps; i++) {
    const t = i/steps;
    const a = startA + t * Math.PI * 2 * turns;
    const wob = 1 + (rng()-0.5) * 0.05;
    const x = cx + Math.cos(a) * rx * wob;
    const y = cy + Math.sin(a) * ry * wob;
    const p = 0.4 + Math.sin(t * Math.PI) * 0.6;
    pts.push([x, y, p]);
  }
  return `<path d="${pfPath(pts, { size: 3.4, startTaper: 14, endTaper: 22 })}" fill="#c94c3a"/>`;
}

// Curved arrow from (x1,y1) to (x2,y2) with head
function freehandArrow(x1, y1, x2, y2, { curve = 0.3, seed = 1 } = {}) {
  const rng = seededRng(seed);
  const dx = x2 - x1, dy = y2 - y1;
  const mx = (x1+x2)/2 - dy * curve;
  const my = (y1+y2)/2 + dx * curve;
  const pts = [];
  const steps = 40;
  for (let i = 0; i <= steps; i++) {
    const t = i/steps;
    const u = 1 - t;
    const x = u*u*x1 + 2*u*t*mx + t*t*x2 + (rng()-0.5)*0.6;
    const y = u*u*y1 + 2*u*t*my + t*t*y2 + (rng()-0.5)*0.6;
    const p = 0.3 + t * 0.8;
    pts.push([x, y, p]);
  }
  // arrow head: two short strokes from tip
  const ang = Math.atan2(y2 - my, x2 - mx);
  const headLen = 12;
  const h1 = [x2 - Math.cos(ang - 0.4) * headLen, y2 - Math.sin(ang - 0.4) * headLen];
  const h2 = [x2 - Math.cos(ang + 0.4) * headLen, y2 - Math.sin(ang + 0.4) * headLen];
  const head1 = [[h1[0], h1[1], 0.3], [x2, y2, 0.9]];
  const head2 = [[h2[0], h2[1], 0.3], [x2, y2, 0.9]];
  return `
    <path d="${pfPath(pts, { size: 3.2, startTaper: 10, endTaper: 4 })}" fill="#c94c3a"/>
    <path d="${pfPath(head1, { size: 3, startTaper: 8, endTaper: 2 })}" fill="#c94c3a"/>
    <path d="${pfPath(head2, { size: 3, startTaper: 8, endTaper: 2 })}" fill="#c94c3a"/>
  `;
}

// Checkmark in a box
function freehandCheck(size = 22, seed = 1) {
  const rng = seededRng(seed);
  const pts = [
    [size*0.22, size*0.52, 0.4],
    [size*0.32, size*0.60, 0.6],
    [size*0.45, size*0.75, 0.9],
    [size*0.78, size*0.25, 0.5],
  ].map(([x,y,p]) => [x + (rng()-0.5)*0.8, y + (rng()-0.5)*0.8, p]);
  return `<path d="${pfPath(pts, { size: 3.4, startTaper: 10, endTaper: 16 })}" fill="#c94c3a"/>`;
}

// X (close)
function freehandX(size = 22, seed = 1) {
  const rng = seededRng(seed);
  const p = 4;
  const stroke1 = [
    [p + (rng()-0.5)*0.6, p + (rng()-0.5)*0.6, 0.3],
    [size-p + (rng()-0.5)*0.6, size-p + (rng()-0.5)*0.6, 0.9],
  ];
  const stroke2 = [
    [size-p + (rng()-0.5)*0.6, p + (rng()-0.5)*0.6, 0.3],
    [p + (rng()-0.5)*0.6, size-p + (rng()-0.5)*0.6, 0.9],
  ];
  return `
    <path d="${pfPath(stroke1, { size: 3.2, startTaper: 8, endTaper: 14 })}" fill="#c94c3a"/>
    <path d="${pfPath(stroke2, { size: 3.2, startTaper: 8, endTaper: 14 })}" fill="#c94c3a"/>
  `;
}

// Highlighter wash behind choice text
function freehandHighlighter(w, h, seed = 1) {
  const rng = seededRng(seed);
  const pts = [];
  const steps = Math.max(14, Math.floor(w / 12));
  for (let i = 0; i <= steps; i++) {
    const x = (i/steps) * w;
    const y = h/2 + (rng()-0.5) * 1.5;
    pts.push([x, y, 1]);
  }
  const stroke = getStroke(pts, {
    size: h * 0.9,
    thinning: 0.15,
    smoothing: 0.8,
    streamline: 0.7,
    simulatePressure: false,
    start: { taper: 30, cap: true },
    end:   { taper: 40, cap: true },
  });
  if (!stroke.length) return '';
  const d = stroke.reduce((acc, [x, y], i) => i === 0 ? `M ${x} ${y}` : acc + ` L ${x} ${y}`, '') + ' Z';
  return `<path d="${d}" fill="#f4d35e" fill-opacity="0.5"/>`;
}

// Squiggly divider line
function freehandSquiggle(w, seed = 1) {
  const rng = seededRng(seed);
  const pts = [];
  const steps = Math.max(30, Math.floor(w / 6));
  for (let i = 0; i <= steps; i++) {
    const x = (i/steps) * w;
    const y = 6 + Math.sin(i * 0.45) * 3 + (rng()-0.5) * 0.6;
    const p = Math.max(0.3, 1 - Math.abs(i/steps - 0.5) * 1.2);
    pts.push([x, y, p]);
  }
  return `<path d="${pfPath(pts, { size: 2.6, startTaper: 20, endTaper: 24 })}" fill="#c94c3a"/>`;
}

// Empty box (square) freehand — for choice checkbox
function freehandBox(size = 22, seed = 1) {
  const rng = seededRng(seed);
  const p = 2;
  const a = [p + (rng()-0.5)*0.6, p + (rng()-0.5)*0.6];
  const b = [size-p + (rng()-0.5)*0.6, p + (rng()-0.5)*0.6];
  const c = [size-p + (rng()-0.5)*0.6, size-p + (rng()-0.5)*0.6];
  const d = [p + (rng()-0.5)*0.6, size-p + (rng()-0.5)*0.6];
  const loop = [a, b, c, d, a].map((pt, i) => [pt[0], pt[1], 0.5 + (i%2)*0.3]);
  return `<path d="${pfPath(loop, { size: 2.8, startTaper: 6, endTaper: 10 })}" fill="#1e3a5f"/>`;
}

// Freehand strikethrough line, used for done todos
function freehandStrike(width, seed = 1) {
  const rng = seededRng(seed);
  const pts = [];
  const n = Math.max(3, Math.floor(width / 40));
  for (let i = 0; i <= n; i++) {
    const x = (i / n) * width;
    const y = 4 + (rng() - 0.5) * 1.5;
    pts.push([x, y, 0.5 + (rng() - 0.5) * 0.3]);
  }
  return `<path d="${pfPath(pts, { size: 2.4, startTaper: 8, endTaper: 14 })}" fill="#c94c3a"/>`;
}

// Seeded RNG
function seededRng(seed) {
  let s = seed * 2654435761 | 0;
  return () => {
    s = (s + 0x6D2B79F5) | 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ---------- rough.js helpers (structural only) ----------
function roughRect(svgEl, w, h, seed, { fill = 'none', stroke = '#1e3a5f', dashed = false } = {}) {
  const rc = rough.svg(svgEl);
  const opts = {
    roughness: 1.8,
    bowing: 1.5,
    strokeWidth: 2.2,
    stroke,
    seed,
    fill: fill === 'none' ? undefined : fill,
    fillStyle: 'hachure',
    hachureAngle: -35,
    hachureGap: 6,
  };
  if (dashed) opts.strokeLineDash = [8, 6];
  const node = rc.rectangle(2, 2, Math.max(10, w - 4), Math.max(10, h - 4), opts);
  svgEl.appendChild(node);
}

function roughDashedLine(svgEl, x1, y1, x2, y2, seed) {
  const rc = rough.svg(svgEl);
  const node = rc.line(x1, y1, x2, y2, {
    roughness: 2.0,
    bowing: 2,
    strokeWidth: 2.4,
    stroke: '#1e3a5f',
    seed,
    strokeLineDash: [9, 7],
  });
  svgEl.appendChild(node);
}

function optionsForStage(stageIdx) {
  const stage = STAGES[stageIdx];
  if (stageIdx === 0) return stage.optionsBy['_root_'];
  const prev = state.locked[stageIdx - 1];
  if (!prev) return [];
  const byTag = stage.optionsBy[prev.option.pathTag];
  if (byTag) return byTag;
  return stage.optionsBy['_default_'] || [];
}

// Derive a small to-do checklist for each option. If the option has an
// explicit `todos` array, use it; otherwise synthesize 3 sensible first
// actions from the deadline / effort / body metadata.
function todosForOption(option, stageIdx) {
  if (option.todos && option.todos.length) return option.todos;
  const todos = [];
  if (option.deadline && option.deadline.toLowerCase() !== 'no app · open drop-in') {
    todos.push(`Add deadline to calendar: ${option.deadline}`);
  }
  todos.push(`Block ${option.effort.split('·')[0].trim()} on schedule`);
  // Stage-specific first actions
  if (stageIdx === 0) {
    todos.push('Book a College advisor / AAP counselor meeting');
  } else if (stageIdx === 1) {
    todos.push('Find the General Meeting date + RSVP');
  } else if (stageIdx === 2) {
    todos.push('Draft application / intro email');
  } else if (stageIdx === 3) {
    todos.push('Email 3 potential mentors / PIs this week');
  } else {
    todos.push('Write 1-line progress note each Friday');
  }
  return todos;
}

// Tiny HTML escape for user-entered / data strings
function escapeAttr(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function render() {
  stagesEl.innerHTML = '';
  const nextStageIdx = state.locked.length;

  // Render locked stages
  state.locked.forEach((lock, i) => {
    const stage = STAGES[i];
    const r = rot(`locked-${i}`);
    // Sticky rotation & tape rotation, persisted per-stage
    const noteRot = rotCustom(`sticky-${i}`, -4, 4);
    const tapeRot = rotCustom(`tape-${i}`, -6, 2);
    const isJustLocked = state.justLockedIdx === i;
    const stickyTitle = lock.option.title;
    const todos = todosForOption(lock.option, i);
    const checkedSet = state.checked[i] || new Set();
    const doneCount = Array.from(checkedSet).filter(ti => ti < todos.length).length;
    const totalTodos = todos.length;
    const isAllDone = doneCount === totalTodos && totalTodos > 0;

    // Short description = first sentence of option.body (fallback to why).
    const bodySrc = (lock.option.body || lock.option.why || '').trim();
    const firstSentence = bodySrc.split(/(?<=[.!?])\s+/)[0] || '';
    const shortDesc = firstSentence.length > 140 ? firstSentence.slice(0, 138) + '…' : firstSentence;

    // Category index drives the tag/underline/count color
    const catIdx = i; // stage index maps 1:1 to category color

    // Freehand title underline, category-tinted (uses pfPath + a seeded wobble)
    const ulW = 160;
    const ulSeed = (i + 3) * 17;
    const ulRng = seededRng(ulSeed);
    const ulPts = [];
    const ulSteps = 22;
    for (let s = 0; s <= ulSteps; s++) {
      const x = (s / ulSteps) * ulW;
      const y = 6 + (ulRng() - 0.5) * 1.4 + Math.sin(s * 0.6) * 0.4;
      const pr = Math.max(0.3, 1 - Math.abs(s/ulSteps - 0.5) * 1.2);
      ulPts.push([x, y, pr]);
    }
    const ulColor = `var(--cat-${catIdx}-d)`;
    const titleUl = `<svg class="node__title-ul" preserveAspectRatio="none" viewBox="0 0 ${ulW} 12"><path d="${pfPath(ulPts, { size: 2.8, startTaper: 18, endTaper: 24 })}" fill="${ulColor}" opacity="0.7"/></svg>`;

    // Phase 1: minimal locked card (no todos visible).
    // Phase 2 (confirmed): card expands with checkable todos.
    // Landed: once all todos are done, the sticky lands on top of this card.
    const showTodos = state.confirmed;
    const hasLanded = !!state.landed[i];
    const isJustLanded = state.justLandedIdx === i;
    stagesEl.insertAdjacentHTML('beforeend', `
      <div class="tl__stage-lbl" data-stage-lbl="${i}">${stage.stage}</div>
      <div class="tl__row ${hasLanded || isJustLanded ? 'tl__row--landed' : ''}" data-row-idx="${i}">
        ${renderMarginalia(i, 'locked')}
        <div class="node node--locked ${hasLanded ? 'node--done' : ''}" data-locked-wrap="${i}"
             style="--rot: ${r}deg; --catL: var(--cat-${catIdx}); --catD: var(--cat-${catIdx}-d);">
          <svg class="node__shape" data-rough-locked="${i}"></svg>
          <svg class="node__check" viewBox="0 0 36 36"></svg>
          <div class="node__inner">
            <button class="node__reopen" data-locked-idx="${i}" aria-label="${state.confirmed ? 'View stage info' : 'Reopen stage'}">
              <div class="node__period">${escapeAttr(stage.when)}</div>
              <h3 class="node__title-card">
                ${escapeAttr(lock.option.title)}
                ${titleUl}
              </h3>
              ${shortDesc ? `<p class="node__desc">${escapeAttr(shortDesc)}</p>` : ''}
              <div class="node__meta">
                <span class="node__tag">${escapeAttr(lock.option.eyebrow)}</span>
                <span class="node__status ${isAllDone ? 'node__status--done' : 'node__status--soon'}">
                  ${!state.confirmed
                    ? '<span class="node__status-check">✓</span>Locked'
                    : isAllDone
                      ? '<span class="node__status-check">✓</span>Done'
                      : '→ In progress'}
                </span>
                ${state.confirmed ? `<span class="node__count">${doneCount}/${totalTodos} tasks</span>` : ''}
              </div>
            </button>
            ${showTodos ? `
            <div class="node__todos">
              <div class="node__todos-lbl">next steps</div>
              ${todos.map((t, ti) => {
                const isDone = checkedSet.has(ti);
                return `
                <button class="node__todo ${isDone ? 'node__todo--done' : ''}"
                        data-todo="${i}:${ti}">
                  <span class="node__todo__box"><svg viewBox="0 0 22 22" data-todo-box="${i}:${ti}:${isDone?1:0}"></svg></span>
                  <span class="node__todo__txt">
                    <svg class="node__todo__strike" data-todo-strike="${i}:${ti}"></svg>
                    ${escapeAttr(t)}
                  </span>
                </button>`;
              }).join('')}
            </div>` : ''}
          </div>
          ${hasLanded || isJustLanded ? `
            <div class="sticky sticky--landed ${isJustLanded ? 'sticky--landing' : ''}"
                 data-sticky-landed="${i}"
                 style="--note-rot:${noteRot}deg; --tape-rot:${tapeRot}deg;">
              <span class="sticky__txt">${stickyTitle}</span>
              <span class="sticky__signed">— ${(readOnboardingProfile().name||'Y')[0].toUpperCase()} ✓</span>
              <span class="sticky__kicker sticky__kicker--done">done!</span>
            </div>` : ''}
        </div>
      </div>
    `);
  });

  // Current open stage
  if (state.openPromptIdx >= 0 && state.openPromptIdx === nextStageIdx) {
    const stage = STAGES[state.openPromptIdx];
    const aiOpts = state._aiOptions[state.openPromptIdx];
    const opts = (aiOpts != null) ? aiOpts : optionsForStage(state.openPromptIdx);
    const r = rot(`choices-${state.openPromptIdx}`);
    const loadingHtml = state._aiLoading && aiOpts == null
      ? `<div class="choices__loading" style="padding:12px 0;opacity:0.6;font-style:italic;text-align:center;">thinking…</div>`
      : '';
    stagesEl.insertAdjacentHTML('beforeend', `
      <div class="tl__stage-lbl">${stage.stage}</div>
      <div class="tl__row">
        ${renderMarginalia(state.openPromptIdx, 'open')}
        <div class="choices" style="--rot: ${r}deg;" data-choices-idx="${state.openPromptIdx}">
          <svg class="choices__shape" data-rough-choices></svg>
          <div class="choices__inner">
            <div class="choices__hd">
              <span>Choose one
                <svg class="choices__hd-underline"></svg>
              </span>
              <button class="choices__close" data-close-choices>
                <svg viewBox="0 0 22 22"></svg>
              </button>
            </div>
            ${loadingHtml}
            ${opts.map((o, i) => {
              const isSel = state.selectedChoice && state.selectedChoice.option.id === o.id;
              return `
              <button class="choice ${isSel ? 'is-selected' : ''}" data-choice-idx="${i}"
                      style="--catL: var(--cat-${state.openPromptIdx}); --catD: var(--cat-${state.openPromptIdx}-d);">
                <span class="choice__box"><svg viewBox="0 0 22 22"></svg></span>
                <span class="choice__text">
                  <svg class="choice__highlight"></svg>
                  <span class="choice__text-inner">${escapeAttr(o.title)}</span>
                  <span class="choice__meta">
                    <span class="choice__chip">${escapeAttr(o.eyebrow)}</span>
                    <span class="choice__when">${escapeAttr(o.when)}</span>
                  </span>
                </span>
              </button>
            `}).join('')}
          </div>
        </div>
      </div>
    `);
  } else if (nextStageIdx < STAGES.length) {
    const stage = STAGES[nextStageIdx];
    const r = rot(`prompt-${nextStageIdx}`);
    // Timeline-card-style eyebrow/title for consistency. Wobble underline
    // uses the same category-tinted scheme as locked nodes.
    const pCat = nextStageIdx;
    const pUlW = 180;
    const pRng = seededRng((nextStageIdx + 5) * 19);
    const pPts = [];
    for (let s = 0; s <= 22; s++) {
      const x = (s / 22) * pUlW;
      const y = 6 + (pRng() - 0.5) * 1.4 + Math.sin(s * 0.6) * 0.4;
      const pr = Math.max(0.3, 1 - Math.abs(s/22 - 0.5) * 1.2);
      pPts.push([x, y, pr]);
    }
    const pUl = `<svg class="prompt__title-ul" preserveAspectRatio="none" viewBox="0 0 ${pUlW} 12"><path d="${pfPath(pPts, { size: 2.8, startTaper: 18, endTaper: 24 })}" fill="var(--cat-${pCat}-d)" opacity="0.55"/></svg>`;
    stagesEl.insertAdjacentHTML('beforeend', `
      <div class="tl__stage-lbl">${stage.stage}</div>
      <div class="tl__row">
        ${renderMarginalia(nextStageIdx, 'open')}
        <button class="prompt prompt--card" data-open-stage="${nextStageIdx}"
                style="--rot: ${r}deg; --catL: var(--cat-${pCat}); --catD: var(--cat-${pCat}-d);">
          <svg class="prompt__shape" data-rough-prompt></svg>
          <div class="prompt__inner">
            <div class="prompt__period">${escapeAttr(stage.when)}</div>
            <h3 class="prompt__title-card">
              ${escapeAttr(stage.prompt)}
              ${pUl}
            </h3>
            <div class="prompt__meta">
              <span class="prompt__tag">${escapeAttr(stage.stage.split('·')[1]?.trim() || stage.stage)}</span>
              <span class="prompt__status">→ not decided yet</span>
              <span class="prompt__count">3 options</span>
            </div>
            <div class="prompt__cta">↓ tap to see three options</div>
          </div>
        </button>
      </div>
    `);
  } else {
    const r = rot('final');
    stagesEl.insertAdjacentHTML('beforeend', `
      <div class="tl__stage-lbl">Plan complete!</div>
      <div class="tl__row">
        <div class="node" style="--rot: ${r}deg;">
          <svg class="node__shape" data-rough-final></svg>
          <div class="node__inner">
            <div class="node__eyebrow">pathway ready</div>
            <div class="node__title">5 stages locked. Review, export, or reopen any step to rebranch.</div>
          </div>
        </div>
      </div>
    `);
  }

  decorate();
  wireEvents();
}



// Marginalia rotates by stage index, but only appears on the CURRENT
// (open prompt or choices) row — so "← start here" always points to
// the action the user should take next, never gets orphaned next to a
// locked decision.
const MARGINALIA = [
  { text: 'start here →', rot: -4, top: 14 },
  { text: 'pick one →', rot: -4, top: 14 },
  { text: 'keep going →', rot: -3, top: 14 },
  { text: 'ask advisor →', rot: -3, top: 16 },
  { text: 'last one →', rot: -4, top: 14 },
];
function renderMarginalia(idx, kind /* 'locked' | 'open' */) {
  // Disabled per user request — remove small timeline/arrow pointer on left.
  return '';
}

// Decorate with rough.js (structural) and perfect-freehand (red ink)
function decorate() {
  // root underline (red freehand double)
  const rootEl = document.querySelector('[data-root-underline]');
  if (rootEl && !rootEl.dataset.decorated) {
    rootEl.dataset.decorated = '1';
    const w = rootEl.offsetWidth;
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('viewBox', `0 0 ${w} 18`);
    svg.style.cssText = `position:absolute;left:0;bottom:-8px;width:${w}px;height:18px;overflow:visible;`;
    svg.innerHTML = freehandUnderline(w, { double: true, seed: 11 });
    rootEl.style.position = 'relative';
    rootEl.appendChild(svg);
  }
  // root arrow removed per user request (was the small timeline pointer)
  const rootArrow = document.getElementById('root-arrow');
  if (rootArrow) { rootArrow.style.display = 'none'; }
  // Empty-panel arrow
  const emptyArrow = document.getElementById('empty-arrow');
  if (emptyArrow && !emptyArrow.dataset.decorated) {
    emptyArrow.dataset.decorated = '1';
    emptyArrow.innerHTML = freehandArrow(72, 20, 10, 60, { curve: 0.4, seed: 7 });
  }

  // Rough.js: locked-node rectangle
  document.querySelectorAll('[data-rough-locked]').forEach(svg => {
    const parent = svg.closest('.node');
    const w = parent.offsetWidth, h = parent.offsetHeight;
    svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
    svg.style.width = w + 'px'; svg.style.height = h + 'px';
    svg.innerHTML = '';
    roughRect(svg, w, h, parseInt(svg.dataset.roughLocked) + 101, { stroke: '#1e3a5f' });
  });
  // Perfect-freehand: check mark on each locked node
  document.querySelectorAll('.node--locked .node__check').forEach((svg, i) => {
    svg.innerHTML = freehandCheck(36, i + 42);
  });

  // Rough.js: final card rectangle
  document.querySelectorAll('[data-rough-final]').forEach(svg => {
    const parent = svg.closest('.node');
    const w = parent.offsetWidth, h = parent.offsetHeight;
    svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
    svg.style.width = w + 'px'; svg.style.height = h + 'px';
    svg.innerHTML = '';
    roughRect(svg, w, h, 999, { stroke: '#c94c3a' });
  });

  // Rough.js: prompt rectangle (dashed)
  document.querySelectorAll('[data-rough-prompt]').forEach(svg => {
    const parent = svg.closest('.prompt');
    const w = parent.offsetWidth, h = parent.offsetHeight;
    svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
    svg.style.width = w + 'px'; svg.style.height = h + 'px';
    svg.innerHTML = '';
    roughRect(svg, w, h, 55, { stroke: '#1e3a5f', dashed: true });
  });

  // Rough.js: choices container rectangle
  document.querySelectorAll('[data-rough-choices]').forEach(svg => {
    const parent = svg.closest('.choices');
    const w = parent.offsetWidth, h = parent.offsetHeight;
    svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
    svg.style.width = w + 'px'; svg.style.height = h + 'px';
    svg.innerHTML = '';
    roughRect(svg, w, h, 77, { stroke: '#1e3a5f' });
  });

  // perfect-freehand: "Choose one" header underline (red)
  document.querySelectorAll('.choices__hd-underline').forEach(svg => {
    const w = 130;
    svg.setAttribute('viewBox', `0 0 ${w} 14`);
    svg.style.cssText = `position:absolute;left:0;bottom:-6px;width:${w}px;height:14px;overflow:visible;`;
    svg.innerHTML = freehandUnderline(w, { double: false, seed: 99 });
  });

  // perfect-freehand: X close button
  document.querySelectorAll('.choices__close svg').forEach(svg => {
    svg.setAttribute('viewBox', '0 0 22 22');
    svg.style.cssText = 'width:22px;height:22px;overflow:visible;';
    svg.innerHTML = freehandX(22, 5);
  });

  // perfect-freehand: choice checkboxes (navy square) + checkmark if selected + circle if selected + highlighter
  document.querySelectorAll('.choice').forEach((ch, idx) => {
    const boxSvg = ch.querySelector('.choice__box svg');
    boxSvg.setAttribute('viewBox', '0 0 22 22');
    boxSvg.style.cssText = 'width:22px;height:22px;overflow:visible;';
    let boxContent = freehandBox(22, idx * 13 + 5);
    if (ch.classList.contains('is-selected')) {
      boxContent += freehandCheck(22, idx * 13 + 77);
    }
    boxSvg.innerHTML = boxContent;

    // highlighter wash behind the text
    const hl = ch.querySelector('.choice__highlight');
    if (hl) {
      const textEl = ch.querySelector('.choice__text-inner');
      const tw = Math.max(120, textEl ? textEl.offsetWidth : 200);
      const th = Math.max(22, textEl ? textEl.offsetHeight : 22);
      hl.setAttribute('viewBox', `0 0 ${tw+12} ${th+4}`);
      hl.style.cssText = `position:absolute;left:-6px;top:-2px;width:${tw+12}px;height:${th+4}px;overflow:visible;z-index:-1;opacity:${ch.classList.contains('is-selected')?1:0};`;
      hl.innerHTML = freehandHighlighter(tw+12, th+4, idx * 17 + 3);
    }

    // red circle around the whole selected option
    const existing = ch.querySelector('.choice__circle');
    if (existing) existing.remove();
    if (ch.classList.contains('is-selected')) {
      const w = ch.offsetWidth, h = ch.offsetHeight;
      const circ = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      circ.classList.add('choice__circle');
      circ.setAttribute('viewBox', `0 0 ${w} ${h}`);
      circ.style.cssText = `position:absolute;inset:0;pointer-events:none;overflow:visible;z-index:2;`;
      circ.innerHTML = freehandCircle(w, h, idx * 11 + 13);
      ch.appendChild(circ);
    }
  });

  // perfect-freehand: todo checklist boxes inside locked nodes
  document.querySelectorAll('[data-todo-box]').forEach(svg => {
    const [stageIdx, todoIdx, isDone] = svg.dataset.todoBox.split(':').map(Number);
    const seed = stageIdx * 31 + todoIdx * 7 + 11;
    svg.setAttribute('viewBox', '0 0 22 22');
    svg.style.cssText = 'width:100%;height:100%;overflow:visible;';
    let content = freehandBox(22, seed);
    if (isDone) {
      content += freehandCheck(22, seed + 77);
    }
    svg.innerHTML = content;
  });

  // perfect-freehand: strikethrough for checked todos (only visible when --done)
  document.querySelectorAll('[data-todo-strike]').forEach(svg => {
    const [stageIdx, todoIdx] = svg.dataset.todoStrike.split(':').map(Number);
    const parent = svg.parentElement;
    const btn = svg.closest('.node__todo');
    if (!btn) return;
    // Draw a freehand horizontal line sized to parent text width
    const w = Math.max(60, parent.offsetWidth + 4);
    svg.setAttribute('viewBox', `0 0 ${w} 8`);
    svg.style.width = w + 'px';
    svg.innerHTML = freehandStrike(w, stageIdx * 13 + todoIdx * 5 + 3);
  });

  // Freehand strike across landed-sticky title text
  document.querySelectorAll('[data-sticky-strike]').forEach(svg => {
    const parent = svg.closest('.sticky--landed');
    if (!parent) return;
    const w = parent.offsetWidth;
    if (!w) return;
    svg.setAttribute('viewBox', `0 0 ${w} 18`);
    svg.innerHTML = '';
    const seed = (parseInt(svg.dataset.stickyStrike) + 1) * 19;
    const rng = seededRng(seed);
    const pts = [];
    const steps = 24;
    for (let s = 0; s <= steps; s++) {
      const x = (s / steps) * (w - 8) + 4;
      const y = 9 + (rng() - 0.5) * 1.8 + Math.sin(s * 0.4) * 0.8;
      const pr = Math.max(0.25, 1 - Math.abs(s/steps - 0.5) * 1.3);
      pts.push([x, y, pr]);
    }
    svg.innerHTML = `<path d="${pfPath(pts, { size: 3.4, startTaper: 18, endTaper: 22 })}" fill="#c94c3a"/>`;
  });
}

function drawSpine() {
  const svg = document.getElementById('tl-spine');
  if (!svg) return;
  const tl = document.getElementById('tl');
  const rows = tl.querySelectorAll('.tl__row');
  if (rows.length < 2) { svg.innerHTML = ''; return; }

  const tlRect = tl.getBoundingClientRect();
  const firstRow = rows[0].getBoundingClientRect();
  const lastRow = rows[rows.length - 1].getBoundingClientRect();

  // spine spans vertically from bottom of row[0] to top of last row
  const yStart = firstRow.bottom - tlRect.top - 40;
  const yEnd = lastRow.top - tlRect.top + 10;
  const height = Math.max(20, yEnd - yStart);

  svg.style.top = (yStart + 40) + 'px';
  svg.style.height = height + 'px';
  svg.setAttribute('viewBox', `0 0 40 ${height}`);
  svg.innerHTML = '';
  roughDashedLine(svg, 20, 0, 20, height, 123);
}

function renderBoard() {
  const totalStages = STAGES.length;
  const lockedCount = state.locked.length;
  const isComplete = lockedCount === totalStages;
  const allDone = isComplete && state.locked.every((_, i) => state.landed[i]);

  // Board title
  let title, sub;
  if (!state.confirmed) {
    if (lockedCount === 0) {
      title = 'Your plan';
      sub = 'as you lock in each stage, it drops onto this board.';
    } else if (isComplete) {
      title = '5 stages · ready';
      sub = 'review your plan, then confirm to start executing.';
    } else {
      title = `Your plan · ${lockedCount}/${totalStages}`;
      sub = `${totalStages - lockedCount} stage${totalStages - lockedCount===1?'':'s'} to go.`;
    }
  } else {
    if (allDone) {
      title = 'Plan complete!';
      sub = 'all five stages done. Every sticky landed.';
    } else {
      const donePct = state.locked.filter((_, i) => state.landed[i]).length;
      title = `Executing · ${donePct}/${totalStages}`;
      sub = 'check off todos on each card to retire its sticky.';
    }
  }

  // Build slots: locked stages get stickies; empty slots are dashed placeholders
  const slots = [];
  for (let i = 0; i < totalStages; i++) {
    if (i < lockedCount) {
      const lock = state.locked[i];
      const isJustLocked = state.justLockedIdx === i;
      const isLanded = !!state.landed[i];
      const isJustLanded = state.justLandedIdx === i;
      const noteRot = rotCustom(`board-sticky-${i}`, -5, 5);
      const tapeRot = rotCustom(`board-tape-${i}`, -8, 4);
      if (isLanded || isJustLanded) {
        // Sticky has flown to the card — show a ghost/echo outline on the board
        slots.push(`
          <div class="board__slot board__slot--retired" data-board-slot="${i}">
            <svg class="board__slot__rough" data-rough-board-slot="${i}" preserveAspectRatio="none"></svg>
            <div class="board__slot__lbl">retired · on card ↙</div>
          </div>`);
      } else {
        slots.push(`
          <div class="board__slot">
            <div class="sticky sticky--board ${isJustLocked ? 'sticky--dropping' : ''}"
                 data-sticky-idx="${i}"
                 style="--note-rot:${noteRot}deg; --tape-rot:${tapeRot}deg;">
              <span class="sticky__kicker">stage ${i+1}</span>
              <span class="sticky__txt">${lock.option.title}</span>
              <span class="sticky__signed">— ${(readOnboardingProfile().name||'Y')[0].toUpperCase()} ✓</span>
            </div>
          </div>`);
      }
    } else {
      slots.push(`
        <div class="board__slot board__slot--empty" data-empty-slot="${i}">
          <svg class="board__slot__rough" data-rough-board-slot="${i}" preserveAspectRatio="none"></svg>
          <div class="board__slot__num">${i+1}</div>
          <div class="board__slot__lbl">${STAGES[i].stage.split('·')[1]?.trim() || ''}</div>
        </div>`);
    }
  }

  const confirmBtnRot = rot('board-confirm-btn');
  const showConfirm = isComplete && !state.confirmed;

  panelEl.innerHTML = `
    <div class="board">
      <div class="board__hd">
        <div class="board__ttl" id="board-ttl">${title}
          <svg class="board__ttl-underline" id="board-ttl-ul"></svg>
        </div>
        <div class="board__sub">${sub}</div>
      </div>
      ${showConfirm ? `
        <div class="board__confirm-wrap board__confirm-wrap--top">
          <button class="btn btn--primary btn--confirm" data-action="confirm-plan" style="--rot: ${confirmBtnRot}deg;">
            <svg class="btn__shape" data-btn-shape="primary"></svg>
            <span class="btn__label">Confirm plan · start executing →</span>
          </button>
          <div class="board__confirm-note">Once confirmed, you'll check off todos on each card. Reopening locked stages is disabled.</div>
        </div>
      ` : state.confirmed && !allDone ? `
        <div class="board__exec-note">
          <span class="board__exec-note__bullet">✓</span>
          Plan confirmed. Click todos on the left to check them off. Finish a stage's todos and its sticky lands on the card.
        </div>
      ` : ''}
      <div class="board__slots">
        ${slots.join('')}
      </div>
      ${allDone ? `
        <div class="board__done-note">★ every stage executed. Full credit, ${(readOnboardingProfile().name||'friend')}.</div>
      ` : ''}
    </div>`;

  // Decorate board title underline
  const ul = document.getElementById('board-ttl-ul');
  const ttl = document.getElementById('board-ttl');
  if (ul && ttl) {
    const w = ttl.offsetWidth;
    ul.setAttribute('viewBox', `0 0 ${w} 14`);
    ul.style.cssText = `position:absolute;left:0;bottom:-4px;width:${w}px;height:14px;overflow:visible;`;
    ul.innerHTML = freehandUnderline(w, { double: false, seed: 42 });
  }
  // Rough board slot outlines (empty + retired)
  panelEl.querySelectorAll('[data-rough-board-slot]').forEach(svg => {
    const parent = svg.parentElement;
    const w = parent.offsetWidth, h = parent.offsetHeight;
    if (!w || !h) return;
    svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
    svg.style.cssText = `position:absolute;inset:0;width:100%;height:100%;overflow:visible;pointer-events:none;`;
    svg.innerHTML = '';
    roughDashedLine(svg, 6, 6, w-6, 6, parseInt(svg.dataset.roughBoardSlot) + 300);
    roughDashedLine(svg, w-6, 6, w-6, h-6, parseInt(svg.dataset.roughBoardSlot) + 301);
    roughDashedLine(svg, w-6, h-6, 6, h-6, parseInt(svg.dataset.roughBoardSlot) + 302);
    roughDashedLine(svg, 6, h-6, 6, 6, parseInt(svg.dataset.roughBoardSlot) + 303);
  });
  // Confirm button shape
  panelEl.querySelectorAll('[data-btn-shape]').forEach(svg => {
    const parent = svg.closest('.btn');
    const w = parent.offsetWidth, h = parent.offsetHeight;
    svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
    svg.style.width = w + 'px'; svg.style.height = h + 'px';
    svg.innerHTML = '';
    roughRect(svg, w, h, 400, { stroke: '#c94c3a' });
  });

  // Wire confirm
  const confirmBtn = panelEl.querySelector('[data-action="confirm-plan"]');
  if (confirmBtn) {
    confirmBtn.addEventListener('click', () => {
      state.confirmed = true;
      render();
      renderPanel();
    });
  }
}

function renderPanel() {
  if (!state.selectedChoice) {
    renderBoard();
    return;
  }
  const { option, stageIdx, viewOnly } = state.selectedChoice;
  const isReopening = !viewOnly && stageIdx < state.locked.length;
  const willWipeCount = state.locked.length - stageIdx;
  const rLock = rot('btn-lock');
  const rGhost = rot('btn-ghost');

  panelEl.innerHTML = `
    <div class="panel">
      <div class="panel__kicker">${option.eyebrow} · ${STAGES[stageIdx].stage}${viewOnly ? ' · locked' : ''}</div>
      <div class="panel__ttl" id="panel-ttl">${option.title}
        <svg class="panel__ttl-underline" id="panel-ttl-ul"></svg>
      </div>
      <div class="panel__meta">
        <div class="panel__meta-row">
          <span class="panel__meta-row__icon">⏰</span>
          <span class="panel__meta-row__lbl">When</span>
          <span class="panel__meta-row__val">${option.when}</span>
        </div>
        <div class="panel__meta-row">
          <span class="panel__meta-row__icon">⚡</span>
          <span class="panel__meta-row__lbl">Effort</span>
          <span class="panel__meta-row__val">${option.effort}</span>
        </div>
        ${option.deadline ? `
        <div class="panel__meta-row panel__meta-row--urgent">
          <span class="panel__meta-row__icon">📅</span>
          <span class="panel__meta-row__lbl">Deadline</span>
          <span class="panel__meta-row__val">${option.deadline}</span>
        </div>` : ''}
      </div>
      <div class="panel__sect">
        <div class="panel__sect__lbl">Why this fits you</div>
        <div class="panel__why">${option.why}</div>
      </div>
      <div class="panel__sect">
        <div class="panel__sect__lbl">What it actually looks like</div>
        <div class="panel__body">${option.body}</div>
      </div>
      <div class="panel__sect">
        <div class="panel__sect__lbl">Sources</div>
        <div class="panel__cites">
          ${option.cites.map(c => `
            <div class="panel__cite">
              <span class="panel__cite__sup">${c[0]}</span>
              <div class="panel__cite__body"><strong>${c[1]}</strong> — ${c[2]}</div>
            </div>`).join('')}
        </div>
      </div>
      <div id="outreach-widget" data-node-id="${option.id || ''}" style="display:none;margin-top:16px;padding:12px 14px;border:1.5px dashed var(--ink-navy);border-radius:6px;background:rgba(253,250,240,0.5)">
        <div style="font-family:'Caveat',cursive;font-size:20px;color:var(--ink-navy);margin-bottom:4px">This step needs outreach — want AI drafts?</div>
        <div style="font-family:'Kalam',cursive;font-size:14px;color:var(--ink-muted);margin-bottom:10px" id="outreach-reason"></div>
        <button data-outreach-kind="email" style="font-family:'Caveat',cursive;font-size:18px;color:var(--ink-red);border:1.5px solid var(--ink-red);background:transparent;border-radius:6px;padding:4px 12px;cursor:pointer">✉️ draft email</button>
        <button data-outreach-kind="cover_letter" style="margin-left:6px;font-family:'Caveat',cursive;font-size:18px;color:var(--ink-red);border:1.5px solid var(--ink-red);background:transparent;border-radius:6px;padding:4px 12px;cursor:pointer">📄 draft cover letter</button>
        <div id="outreach-status" style="margin-top:8px;font-family:'Kalam',cursive;font-size:13px;color:var(--ink-muted);font-style:italic"></div>
        <div id="outreach-drafts" style="margin-top:10px;display:none"></div>
      </div>
      ${isReopening && willWipeCount > 0 ? `
        <div class="reopen-warn">
          ⚠ Locking a different step here will unlock <strong>${willWipeCount}</strong> later step${willWipeCount===1?'':'s'}.
        </div>
      ` : ''}
      <div class="panel__actions">
        ${viewOnly ? `
          <button class="btn btn--ghost" data-action="close" style="--rot: ${rGhost}deg;">
            <svg class="btn__shape" data-btn-shape="ghost"></svg>
            <span class="btn__label">← back to plan</span>
          </button>
        ` : `
          <button class="btn btn--primary" data-action="lock" style="--rot: ${rLock}deg;">
            <svg class="btn__shape" data-btn-shape="primary"></svg>
            <span class="btn__label">Lock it in ✓</span>
          </button>
          <button class="btn btn--ghost" data-action="close" style="--rot: ${rGhost}deg;">
            <svg class="btn__shape" data-btn-shape="ghost"></svg>
            <span class="btn__label">dismiss</span>
          </button>
        `}
      </div>
    </div>`;

  // Decorate panel: freehand title underline
  const ul = document.getElementById('panel-ttl-ul');
  const ttl = document.getElementById('panel-ttl');
  if (ul && ttl) {
    const w = ttl.offsetWidth;
    ul.setAttribute('viewBox', `0 0 ${w} 14`);
    ul.style.cssText = `position:absolute;left:0;bottom:-4px;width:${w}px;height:14px;overflow:visible;`;
    ul.innerHTML = freehandUnderline(w, { double: false, seed: stageIdx * 7 + 3 });
  }
  // Rough.js rectangles around buttons
  panelEl.querySelectorAll('[data-btn-shape]').forEach(svg => {
    const parent = svg.closest('.btn');
    const w = parent.offsetWidth, h = parent.offsetHeight;
    svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
    svg.style.width = w + 'px'; svg.style.height = h + 'px';
    svg.innerHTML = '';
    const isPri = svg.dataset.btnShape === 'primary';
    roughRect(svg, w, h, isPri ? 200 : 201, { stroke: isPri ? '#c94c3a' : '#6b6658' });
  });

  // Outreach widget setup
  (function setupOutreachWidget() {
    const STAGE_KEYS = ['direction', 'community', 'signal', 'summer', 'capstone'];
    const OUTREACH_KEYWORDS = ['email','reach out','contact','mentor','pi','advisor','apply','application','research','intro','cover letter','outreach','office hours','intern'];
    const widget = document.getElementById('outreach-widget');
    const reasonEl = document.getElementById('outreach-reason');
    const statusEl = document.getElementById('outreach-status');
    const draftsEl = document.getElementById('outreach-drafts');
    if (!widget || !reasonEl || !statusEl || !draftsEl) return;

    // Restore saved drafts for this card
    const outreachKey = 'pathway.outreach.v1';
    const cardId = option.id || '';
    const savedAll = (() => { try { return JSON.parse(localStorage.getItem(outreachKey) || '{}'); } catch { return {}; } })();
    if (savedAll[cardId]) {
      widget.style.display = 'block';
      draftsEl.style.display = 'block';
      draftsEl.innerHTML = savedAll[cardId];
      reasonEl.textContent = 'Previously drafted — regenerate anytime.';
    }

    // Client-side heuristic
    const searchText = [(option.title || ''), (option.description || ''), (option.why_this || option.why || '')].join(' ').toLowerCase();
    const heuristicMatch = option.human_contact || OUTREACH_KEYWORDS.some(kw => searchText.includes(kw));
    if (heuristicMatch && widget.style.display === 'none') {
      widget.style.display = 'block';
      reasonEl.textContent = 'This step likely involves contacting someone — draft your outreach now.';
    }

    // Parallel API check (non-blocking)
    const cardPayload = {
      title: option.title,
      description: option.description || option.body,
      why_this: option.why_this || option.why,
      human_contact: option.human_contact,
      stage_key: STAGE_KEYS[stageIdx],
    };
    fetch('/api/should-offer-outreach', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ card: cardPayload }),
      signal: AbortSignal.timeout(3000),
    }).then(r => r.json()).then(data => {
      if (!data.ok) return;
      const wEl = document.getElementById('outreach-widget');
      const rEl = document.getElementById('outreach-reason');
      if (!wEl || !rEl) return;
      if (data.offer && wEl.style.display === 'none') {
        wEl.style.display = 'block';
      }
      // Only update reason if API says offer:true (heuristic wins on offer:true already)
      if (data.offer && data.reason) {
        rEl.textContent = data.reason;
      }
    }).catch(() => { /* fail-open: heuristic already handled */ });

    // Wire outreach draft buttons
    panelEl.querySelectorAll('[data-outreach-kind]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const kind = btn.dataset.outreachKind;
        const sEl = document.getElementById('outreach-status');
        const dEl = document.getElementById('outreach-drafts');
        if (!sEl || !dEl) return;
        sEl.textContent = 'Drafting…';
        dEl.style.display = 'none';
        try {
          const profile = composeIntakeProfile(readOnboardingProfile());
          const resp = await fetch('/api/draft-outreach', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              profile,
              card: {
                title: option.title,
                description: option.description || option.body,
                why_this: option.why_this || option.why,
                human_contact: option.human_contact,
                source_url: option.source_url,
                stage_key: STAGE_KEYS[stageIdx],
              },
              kind,
            }),
          });
          const data = await resp.json();
          if (!data.ok) { sEl.textContent = 'Error: ' + (data.error || 'unknown'); return; }
          sEl.textContent = '';
          const drafts = data.drafts;
          let html = '';
          for (const [key, draft] of Object.entries(drafts)) {
            const d = draft;
            html += `<div style="margin-bottom:14px;border-top:1px dashed #ccc;padding-top:10px">`;
            html += `<div style="font-family:'Caveat',cursive;font-size:16px;color:var(--ink-navy);margin-bottom:4px">${key.replace(/_/g,' ')}</div>`;
            if (d.subject) html += `<div style="font-family:'Kalam',cursive;font-size:13px;color:var(--ink-muted);margin-bottom:4px"><strong>Subject:</strong> ${d.subject}</div>`;
            if (d.title) html += `<div style="font-family:'Kalam',cursive;font-size:13px;color:var(--ink-muted);margin-bottom:4px"><strong>${d.title}</strong></div>`;
            html += `<pre style="white-space:pre-wrap;word-break:break-word;font-family:'Kalam',cursive;font-size:13px;background:#fdf9f0;padding:8px;border-radius:4px;margin:0">${d.body || ''}</pre>`;
            html += `</div>`;
          }
          dEl.innerHTML = html;
          dEl.style.display = 'block';
          // Save to localStorage
          const saved = (() => { try { return JSON.parse(localStorage.getItem(outreachKey) || '{}'); } catch { return {}; } })();
          saved[cardId] = html;
          localStorage.setItem(outreachKey, JSON.stringify(saved));
        } catch (err) {
          const sEl2 = document.getElementById('outreach-status');
          if (sEl2) sEl2.textContent = 'Request failed.';
        }
      });
    });
  })();

  panelEl.querySelector('[data-action="lock"]')?.addEventListener('click', () => {
    // Fresh rotation for the sticky on each NEW lock (so re-locking the same
    // slot gives a slightly different angle, reinforcing the "new sticky" feel).
    delete state.rotations[`sticky-${stageIdx}`];
    delete state.rotations[`tape-${stageIdx}`];
    state.locked = state.locked.slice(0, stageIdx);
    state.locked.push({ stageIdx, option });
    state.selectedChoice = null;
    // Invalidate AI options for the next stage (path changed)
    const nextIdx = state.locked.length;
    delete state._aiOptions[nextIdx];
    state.openPromptIdx = state.locked.length < STAGES.length ? state.locked.length : -1;
    state.justLockedIdx = stageIdx;
    render();
    renderPanel();
    if (state.openPromptIdx >= 0) triggerAIFetch(state.openPromptIdx);
    // Clear the just-locked flag after the full drop+write animation finishes
    // (~1200ms). Do NOT re-render when clearing — the animation is on a
    // one-shot class; subsequent renders just won't add `--dropping` again.
    setTimeout(() => {
      state.justLockedIdx = -1;
    }, 1400);
  });
  panelEl.querySelector('[data-action="close"]').addEventListener('click', () => {
    state.selectedChoice = null;
    render();
    renderPanel();
  });
}

function wireEvents() {
  // Open a stage prompt
  stagesEl.querySelectorAll('[data-open-stage]').forEach(el => {
    el.addEventListener('click', () => {
      state.openPromptIdx = parseInt(el.dataset.openStage, 10);
      state.selectedChoice = null;
      render();
      renderPanel();
      triggerAIFetch(state.openPromptIdx);
    });
  });
  // Close open choices
  const closeBtn = stagesEl.querySelector('[data-close-choices]');
  if (closeBtn) closeBtn.addEventListener('click', () => {
    state.openPromptIdx = -1;
    state.selectedChoice = null;
    render();
    renderPanel();
  });
  // Pick a choice
  stagesEl.querySelectorAll('[data-choice-idx]').forEach(el => {
    el.addEventListener('click', () => {
      const aiOpts = state._aiOptions[state.openPromptIdx];
      const opts = (aiOpts != null) ? aiOpts : optionsForStage(state.openPromptIdx);
      const option = opts[parseInt(el.dataset.choiceIdx, 10)];
      state.selectedChoice = { stageIdx: state.openPromptIdx, option };
      render();
      renderPanel();
    });
  });
  // Click a locked stage card:
  //   Phase 1 (build): reopen — show picker for that stage, downstream wipes on Lock In.
  //   Phase 2 (execute): view-only — show the stored option's info panel, no lock/wipe.
  stagesEl.querySelectorAll('[data-locked-idx]').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.lockedIdx, 10);
      const lock = state.locked[idx];
      if (!lock) return;
      if (state.confirmed) {
        // View-only mode in Phase 2 — surface the info panel without
        // touching state.locked or allowing a re-lock.
        state.selectedChoice = { stageIdx: idx, option: lock.option, viewOnly: true };
        renderPanel();
        return;
      }
      // Phase 1: original reopen behavior.
      state.openPromptIdx = idx;
      state.selectedChoice = null;
      state._pendingRestore = state.locked.slice(idx);
      state.locked = state.locked.slice(0, idx);
      render();
      const prev = state._pendingRestore[0];
      if (prev) {
        state.selectedChoice = { stageIdx: idx, option: prev.option };
        render();
        renderPanel();
      } else {
        renderPanel();
      }
    });
  });

  // Toggle a todo check on a locked stage — don't bubble to the reopen button.
  // Only active in Phase 2 (after Confirm).
  stagesEl.querySelectorAll('[data-todo]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      if (!state.confirmed) return; // gated
      const [stageIdxStr, todoIdxStr] = el.dataset.todo.split(':');
      const sIdx = parseInt(stageIdxStr, 10);
      const tIdx = parseInt(todoIdxStr, 10);
      if (!state.checked[sIdx]) state.checked[sIdx] = new Set();
      const set = state.checked[sIdx];
      if (set.has(tIdx)) set.delete(tIdx); else set.add(tIdx);

      // Check if this completes the stage → trigger sticky-land animation
      const lock = state.locked[sIdx];
      if (lock && !state.landed[sIdx]) {
        const todos = todosForOption(lock.option, sIdx);
        const allDone = todos.every((_, ti) => set.has(ti));
        if (allDone) {
          // Mark "just landed" so render draws sticky on the card with landing anim.
          // Board will render a retired-slot echo in its place.
          state.justLandedIdx = sIdx;
          state.landed[sIdx] = true;
          render();
          renderPanel();
          setTimeout(() => { state.justLandedIdx = -1; }, 1400);
          return;
        }
      }
      // Un-checking a done stage unlands the sticky
      if (lock && state.landed[sIdx]) {
        const todos = todosForOption(lock.option, sIdx);
        const stillDone = todos.every((_, ti) => set.has(ti));
        if (!stillDone) {
          delete state.landed[sIdx];
        }
      }
      render();
      renderPanel();
    });
  });
}

resetBtn.addEventListener('click', () => {
  state.locked = [];
  state.openPromptIdx = 0;
  state.selectedChoice = null;
  state.confirmed = false;
  state.checked = {};
  state.landed = {};
  state.justLockedIdx = -1;
  state.justLandedIdx = -1;
  state._aiOptions = {}; // clear AI cache on reset
  state._aiLoading = false;
  state.rotations = {}; // re-randomize rotations on reset
  render();
  renderPanel();
});

// Redraw rough/freehand on resize (they're absolute-sized)
let resizeT;
window.addEventListener('resize', () => {
  clearTimeout(resizeT);
  resizeT = setTimeout(() => {
    // clear decorated flags so roots redecorate
    document.querySelectorAll('[data-decorated]').forEach(el => delete el.dataset.decorated);
    render();
    renderPanel();
  }, 120);
});

// ============================================================
// AI FETCH TRIGGER — fetches dynamic options for a stage, falls back to static
// ============================================================
function triggerAIFetch(stageIdx) {
  if (stageIdx < 0 || stageIdx >= STAGES.length) return;
  if (state._aiOptions[stageIdx] != null) return; // already fetched
  const prevLock = stageIdx > 0 ? state.locked[stageIdx - 1] : null;
  const parentPathTag = prevLock ? prevLock.option.pathTag : null;
  const pathTrace = state.locked.map(l => ({ id: l.option.id, path_tag: l.option.pathTag }));
  state._aiLoading = true;
  render(); // show loading spinner
  fetchOptionsForStage(stageIdx, parentPathTag, pathTrace).then(results => {
    state._aiLoading = false;
    if (results != null) {
      state._aiOptions[stageIdx] = results;
    }
    render();
    wireEvents();
  });
}

// ============================================================
// INIT — update dynamic sub-line, then render
// ============================================================
function initDynamicProfile() {
  const answers = readOnboardingProfile();
  const subEl = document.getElementById('root-sub');
  if (subEl) {
    const bgStr = (answers.background || []).includes('First-gen') ? 'First-gen · ' : '';
    const intStr = (answers.interests || []).length
      ? ' · ' + (answers.interests || []).slice(0, 2).join(' + ') + ' curious'
      : ' curious';
    subEl.textContent = `${answers.name || 'You'} · ${answers.year} · ${bgStr}${answers.majorStatus}${intStr}`;
  }
}

// Initial render — needs fonts to load so offsetWidth is accurate
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(() => {
    initDynamicProfile();
    render();
    renderPanel();
    triggerAIFetch(state.openPromptIdx);
  });
} else {
  initDynamicProfile();
  render();
  renderPanel();
  triggerAIFetch(state.openPromptIdx);
}
</script>

</body>
</html>
