<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Pathway — notebook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/roughjs@4.6.6/bundled/rough.js"></script>
<script>
// ============================================================
// Minimal perfect-freehand-style tapered stroke generator.
// Returns an outline polygon around a polyline with per-point
// pressure, tapered start/end, and slight variation.
// ============================================================
(function(){
  function dist(a, b) { return Math.hypot(a[0]-b[0], a[1]-b[1]); }
  function lerp(a, b, t) { return a + (b - a) * t; }
  // Perpendicular unit vector from a->b
  function perp(a, b) {
    const dx = b[0]-a[0], dy = b[1]-a[1];
    const len = Math.hypot(dx, dy) || 1;
    return [-dy/len, dx/len];
  }
  // Resample polyline by arc length so spacing is roughly even
  function resample(points, spacing) {
    if (points.length < 2) return points.slice();
    const out = [points[0]];
    let acc = 0;
    for (let i = 1; i < points.length; i++) {
      const a = points[i-1], b = points[i];
      const d = dist(a, b);
      let remaining = d;
      while (acc + remaining >= spacing) {
        const t = (spacing - acc) / d;
        const x = lerp(a[0], b[0], (d - remaining + (spacing-acc))/d);
        const y = lerp(a[1], b[1], (d - remaining + (spacing-acc))/d);
        const p = lerp(a[2] ?? 0.5, b[2] ?? 0.5, (d - remaining + (spacing-acc))/d);
        out.push([x, y, p]);
        remaining = acc + remaining - spacing;
        acc = 0;
      }
      acc += remaining;
    }
    out.push(points[points.length-1]);
    return out;
  }
  function getStroke(points, opts = {}) {
    const size = opts.size ?? 4;
    const thinning = opts.thinning ?? 0.5;
    const startTaper = (opts.start && opts.start.taper) ?? 0;
    const endTaper   = (opts.end && opts.end.taper)   ?? 0;
    const pts = points.map(p => Array.isArray(p) ? p : [p.x, p.y, p.pressure ?? 0.5]);
    if (pts.length < 2) return [];
    const rs = resample(pts, Math.max(1, size * 0.35));
    // arc-length
    const cum = [0];
    for (let i = 1; i < rs.length; i++) cum.push(cum[i-1] + dist(rs[i-1], rs[i]));
    const total = cum[cum.length-1] || 1;
    const L = [], R = [];
    for (let i = 0; i < rs.length; i++) {
      const a = rs[Math.max(0, i-1)];
      const b = rs[Math.min(rs.length-1, i+1)];
      const n = perp(a, b);
      const pr = rs[i][2] ?? 0.5;
      // taper factor
      const d = cum[i];
      const fromStart = startTaper > 0 ? Math.min(1, d / startTaper) : 1;
      const fromEnd = endTaper > 0 ? Math.min(1, (total - d) / endTaper) : 1;
      const taper = Math.min(fromStart, fromEnd);
      // thickness
      const base = size * 0.5;
      const pressureFactor = 1 - thinning + thinning * pr;
      const r = base * pressureFactor * Math.pow(taper, 0.55);
      L.push([rs[i][0] + n[0]*r, rs[i][1] + n[1]*r]);
      R.push([rs[i][0] - n[0]*r, rs[i][1] - n[1]*r]);
    }
    return L.concat(R.reverse());
  }
  window.getStroke = getStroke;
})();
</script>
<style>
  :root {
    /* Ink palette — notebook, not UI */
    --ink-navy: #1e3a5f;      /* primary handwriting */
    --ink-black: #2a2a28;     /* body */
    --ink-red: #c94c3a;       /* red pen, emphasis, marginalia */
    --ink-muted: #6b6658;     /* faded pencil */
    --highlighter: rgba(244, 211, 94, 0.42); /* selected wash */
    --paper: #fdfaf0;
    --paper-edge: #ebe3cc;
    --rule-blue: #b8c8d8;
    --margin-red: #c94c3a;

    /* Stage category colors — light tag bg + darker underline/count */
    --cat-0:     #d9b3ff;  --cat-0-d:     #b27fe8;  /* Direction · purple */
    --cat-1:     #b3d9ff;  --cat-1-d:     #6aa8e0;  /* Community · blue */
    --cat-2:     #ffd0a0;  --cat-2-d:     #e89953;  /* Signal · orange */
    --cat-3:     #b3f0c8;  --cat-3-d:     #5dbe87;  /* Summer · green */
    --cat-4:     #ffb3d1;  --cat-4-d:     #e87aa8;  /* Capstone · pink */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #d8d2c0;
    font-family: "Kalam", "Segoe Print", "Comic Sans MS", cursive;
    color: var(--ink-black);
    line-height: 1.55;
    font-size: 19px;
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Paper texture + ruling lines */
  .paper-bg {
    position: relative;
    background-color: var(--paper);
    background-image:
      /* Ruling lines every 32px */
      repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent 31px,
        rgba(184, 200, 216, 0.45) 31px,
        rgba(184, 200, 216, 0.45) 32px
      );
  }
  /* Subtle paper grain via SVG noise */
  .paper-bg::before {
    content: "";
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.28  0 0 0 0 0.24  0 0 0 0 0.14  0 0 0 0.08 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    background-size: 240px 240px;
    opacity: 0.55;
    mix-blend-mode: multiply;
    pointer-events: none;
    z-index: 1;
  }
  /* Red margin line */
  .paper-bg::after {
    content: "";
    position: absolute;
    top: 0; bottom: 0;
    left: 80px;
    width: 1.5px;
    background: var(--margin-red);
    opacity: 0.55;
    pointer-events: none;
    z-index: 1;
    box-shadow: 0 0 2px rgba(201, 76, 58, 0.35);
  }
  /* Edge vignette */
  .paper-vignette {
    position: absolute; inset: 0;
    box-shadow: inset 0 0 60px rgba(100, 85, 55, 0.18);
    pointer-events: none;
    z-index: 2;
  }

  .canvas {
    padding: 44px 40px 90px;
    max-width: 1400px;
    margin: 0 auto;
    position: relative;
    z-index: 5;
  }
  .canvas__hd {
    display: flex; align-items: baseline; gap: 16px;
    margin-bottom: 8px; padding-left: 60px;
  }
  .canvas__title {
    font-family: "Caveat", cursive;
    font-size: 34px; font-weight: 700;
    color: var(--ink-navy);
    letter-spacing: 0.01em;
    line-height: 1;
  }
  .canvas__sub {
    font-family: "Kalam", cursive;
    font-size: 16px; color: var(--ink-muted);
    font-style: italic;
  }
  .canvas__hint {
    font-family: "Kalam", cursive;
    font-size: 15px;
    color: var(--ink-muted);
    margin: 6px 0 24px 60px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-style: italic;
  }
  .canvas__hint strong { color: var(--ink-navy); font-weight: 700; font-style: normal; }
  .canvas__reset {
    position: absolute;
    top: 20px; right: 24px;
    z-index: 6;
    background: rgba(253, 250, 240, 0.7);
    border: 1.5px dashed var(--ink-muted);
    color: var(--ink-navy);
    font-family: "Kalam", cursive;
    padding: 4px 14px;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
    transform: rotate(-1deg);
  }
  .canvas__reset:hover { border-color: var(--ink-red); color: var(--ink-red); }

  .mock { display: flex; flex-direction: column; gap: 12px; }
  .mock__lbl {
    display: flex; align-items: baseline; gap: 12px;
    padding: 0 60px;
  }
  .mock__letter {
    font-family: "Caveat", cursive;
    font-weight: 700;
    font-size: 40px;
    color: var(--ink-red);
    line-height: 1;
    transform: rotate(-3deg);
    display: inline-block;
  }
  .mock__name {
    font-family: "Kalam", cursive;
    font-size: 18px;
    font-weight: 700;
    color: var(--ink-navy);
  }

  .frame {
    position: relative;
    overflow: hidden;
    height: 100vh;
    display: flex; flex-direction: column;
  }
  .frame__chrome {
    flex: 0 0 auto; height: 52px;
    background: rgba(253, 250, 240, 0.55);
    backdrop-filter: blur(4px);
    border-bottom: 1.5px solid rgba(107, 102, 88, 0.25);
    display: flex; align-items: center; gap: 12px;
    padding: 0 22px;
    font-family: "Kalam", cursive;
    font-size: 14px;
    color: var(--ink-muted);
    position: relative; z-index: 3;
  }
  .frame__chrome__logo { width: 24px; height: 24px; color: var(--ink-navy); }
  .frame__chrome__title {
    font-family: "Caveat", cursive;
    font-weight: 700;
    font-size: 24px;
    color: var(--ink-navy);
    line-height: 1;
  }
  .frame__chrome__spacer { flex: 1; }
  .frame__chrome__right {
    font-family: "Kalam", cursive;
    font-size: 14px;
    color: var(--ink-muted);
    font-style: italic;
  }

  .split { flex: 1; min-height: 0; display: grid; grid-template-columns: 1fr 1fr; position: relative; z-index: 3; }
  .split__list {
    overflow-y: auto;
    border-right: 1.5px solid rgba(107, 102, 88, 0.2);
    position: relative;
  }
  .split__list::-webkit-scrollbar { width: 8px; }
  .split__list::-webkit-scrollbar-thumb { background: rgba(107, 102, 88, 0.3); border-radius: 4px; }
  .split__panel {
    overflow-y: auto;
    position: relative;
  }
  .split__panel::-webkit-scrollbar { width: 8px; }
  .split__panel::-webkit-scrollbar-thumb { background: rgba(107, 102, 88, 0.3); border-radius: 4px; }

  /* Timeline — notebook list layout */
  .tl {
    padding: 32px 32px 60px 180px;
    position: relative;
    min-height: 100%;
  }
  /* rough.js connector gets drawn into this SVG */
  .tl__spine-svg {
    position: absolute;
    left: 90px;
    top: 40px;
    bottom: 40px;
    width: 40px;
    pointer-events: none;
    overflow: visible;
  }
  .tl__row {
    position: relative; z-index: 2;
    margin-bottom: 6px;
  }
  /* Rows with a locked-in sticky need extra clearance so the sticky
     doesn't spill into the next stage. */
  .tl__row--has-sticky {
    min-height: 200px;
    margin-bottom: 20px;
  }
  .tl__stage-lbl {
    font-family: "Caveat", cursive;
    font-weight: 700;
    font-size: 26px;
    color: var(--ink-navy);
    margin: 10px 0 4px;
    padding: 0 4px 0 0;
    position: relative;
    display: inline-block;
  }
  /* First stage label sits right under the root "Maya · Freshman · First-gen"
     sub line — tighten the gap so the plan starts where the intro ends. */
  .tl__row:first-child + .tl__stage-lbl,
  .tl > .tl__stage-lbl:nth-of-type(1) {
    margin-top: 2px;
  }
  /* Marginalia layer */
  .marginalia {
    position: absolute;
    left: -68px;
    font-family: "Caveat", cursive;
    font-weight: 700;
    color: var(--ink-red);
    font-size: 20px;
    line-height: 1;
    transform-origin: center;
    pointer-events: none;
    white-space: nowrap;
  }
  /* Left-edge variant: sits just outside the left border of the stage
     card, pointing right into it so it reads as "start here / pick one". */
  .marginalia--right {
    left: -118px;
    right: auto;
    font-size: 20px;
  }

  /* Node — handwritten label, rough.js border drawn as SVG child */
  .node {
    position: relative;
    width: 92%; max-width: 420px;
    padding: 14px 20px 16px;
    background: transparent;
    border: 0;
    text-align: left;
    cursor: pointer;
    font-family: "Kalam", cursive;
    color: var(--ink-black);
    transition: transform 160ms;
    transform: rotate(var(--rot, 0deg));
  }
  .node:hover { transform: rotate(var(--rot, 0deg)) translateY(-1px); }
  /* Locked stage cards: lift on hover — translate up with subtle scale
     and drop shadow. Rotation preserved so Kalam tilt still reads. */
  .node--locked { transition: transform 180ms ease, filter 180ms ease; }
  .node--locked:hover {
    transform: rotate(var(--rot, 0deg)) translateY(-4px) scale(1.015);
    filter: drop-shadow(0 10px 14px rgba(30, 58, 95, 0.18));
  }
  .node__shape {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: visible;
  }
  .node__inner { position: relative; z-index: 1; }

  .node--root {
    max-width: 460px;
    padding: 18px 0 6px 0;
  }
  .node--root .node__title-main {
    font-family: "Caveat", cursive;
    font-weight: 700;
    font-size: 42px;
    color: var(--ink-navy);
    line-height: 1;
    margin-bottom: 4px;
    display: inline-block;
  }
  .node--root .node__sub {
    font-family: "Kalam", cursive;
    font-size: 16px;
    color: var(--ink-black);
    margin-top: 10px;
  }
  .node--root .node__self-arrow {
    position: absolute;
    left: -40px;
    top: 30px;
    width: 60px;
    height: 70px;
    pointer-events: none;
    overflow: visible;
  }

  .node--locked {
    cursor: pointer;
  }
  .node--locked .node__eyebrow {
    font-family: "Kalam", cursive;
    font-size: 13px;
    color: var(--ink-muted);
    font-style: italic;
    margin-bottom: 2px;
  }
  .node--locked .node__title {
    font-family: "Kalam", cursive;
    font-weight: 700;
    font-size: 17px;
    color: var(--ink-navy);
    line-height: 1.35;
  }
  .node--locked .node__check {
    position: absolute;
    right: -8px; top: -12px;
    width: 36px; height: 36px;
    pointer-events: none;
    overflow: visible;
  }

  /* Locked-node → Timeline card treatment
     ----------------------------------------------
     The locked node swaps its "eyebrow + title" for a card
     styled after the My College Plan timeline: period eyebrow,
     big title w/ category-tinted freehand underline, italic
     description, meta row (category tag · ✓ Done · N/M tasks).
     Uses --catL / --catD vars set inline per stage. */
  .node--locked {
    padding: 16px 22px 18px;
  }
  .node__reopen {
    background: transparent;
    border: 0;
    padding: 0;
    text-align: left;
    cursor: pointer;
    width: 100%;
    display: block;
    font-family: inherit;
    color: inherit;
  }
  .node__period {
    font-family: "Kalam", cursive;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-muted);
    opacity: 0.85;
    margin-bottom: 6px;
  }
  .node__title-card {
    font-family: "Caveat", cursive;
    font-weight: 700;
    font-size: 26px;
    color: var(--ink-navy);
    line-height: 1.08;
    display: inline-block;
    position: relative;
    margin-bottom: 8px;
    padding-bottom: 2px;
  }
  .node__title-ul {
    position: absolute;
    left: 0; top: 100%;
    width: 100%;
    height: 8px;
    margin-top: -2px;
    overflow: visible;
    pointer-events: none;
  }
  .node__desc {
    font-family: "Kalam", cursive;
    font-size: 15px;
    font-style: italic;
    color: var(--ink-black);
    opacity: 0.78;
    line-height: 1.45;
    margin-bottom: 10px;
  }
  .node__meta {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .node__tag {
    font-family: "Kalam", cursive;
    font-size: 12.5px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 12px;
    color: var(--ink-black);
    background-color: var(--catL);
    opacity: 0.92;
  }
  .node__status {
    font-family: "Kalam", cursive;
    font-size: 13.5px;
    font-weight: 700;
  }
  .node__status--done {
    color: #1f7a45;
  }
  .node__status--soon {
    color: #6b4a1f;
  }
  .node__status-check {
    font-size: 15px;
    margin-right: 2px;
  }
  .node__count {
    font-family: "Kalam", cursive;
    font-size: 12.5px;
    font-weight: 700;
    color: var(--catD);
    opacity: 0.75;
  }

  /* Unopened PROMPT → timeline-card styling for consistency with
     the locked-node design. Category-tinted underline + meta row. */
  .prompt--card {
    padding: 14px 22px 16px;
  }
  .prompt__period {
    font-family: "Kalam", cursive;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-muted);
    opacity: 0.85;
    margin-bottom: 6px;
  }
  .prompt__title-card {
    font-family: "Caveat", cursive;
    font-weight: 700;
    font-size: 26px;
    color: var(--ink-navy);
    line-height: 1.08;
    display: inline-block;
    position: relative;
    padding-bottom: 2px;
    margin-bottom: 8px;
  }
  .prompt__title-ul {
    position: absolute;
    left: 0; top: 100%;
    width: 100%;
    height: 8px;
    margin-top: -2px;
    overflow: visible;
    pointer-events: none;
  }
  .prompt__meta {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .prompt__tag {
    font-family: "Kalam", cursive;
    font-size: 12.5px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 12px;
    color: var(--ink-black);
    background-color: var(--catL);
    opacity: 0.92;
  }
  .prompt__status {
    font-family: "Kalam", cursive;
    font-size: 13.5px;
    font-weight: 700;
    color: var(--ink-muted);
    font-style: italic;
  }
  .prompt__count {
    font-family: "Kalam", cursive;
    font-size: 12.5px;
    font-weight: 700;
    color: var(--catD);
    opacity: 0.75;
  }

  /* Choice meta row — category chip + when, so the still-open stage
     echoes the locked-card meta pattern. */
  .choice__meta {
    display: block;
    margin-top: 3px;
    font-family: "Kalam", cursive;
    font-size: 12px;
    color: var(--ink-muted);
    line-height: 1.3;
  }
  .choice__chip {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 10px;
    background-color: var(--catL);
    color: var(--ink-black);
    font-size: 11px;
    font-weight: 700;
    opacity: 0.85;
    margin-right: 6px;
    vertical-align: middle;
  }
  .choice__when {
    font-style: italic;
    opacity: 0.85;
  }
  /* Todo checklist inside a locked node */
  .node__todos {
    margin-top: 14px;
    padding-top: 10px;
    border-top: 1px dashed rgba(30, 58, 95, 0.22);
    display: flex; flex-direction: column; gap: 6px;
    position: relative;
  }
  .node__todos-lbl {
    font-family: "Caveat", cursive;
    font-weight: 700;
    font-size: 18px;
    color: var(--ink-red);
    line-height: 1;
    margin-bottom: 2px;
    letter-spacing: 0.01em;
  }
  .node__todo {
    display: flex; align-items: flex-start; gap: 9px;
    font-family: "Kalam", cursive;
    font-size: 14.5px;
    color: var(--ink-navy);
    line-height: 1.35;
    cursor: pointer;
    background: transparent;
    border: 0;
    padding: 2px 0;
    text-align: left;
    width: 100%;
    font-weight: 400;
    position: relative;
  }
  .node__todo__box {
    flex: 0 0 auto;
    width: 18px; height: 18px;
    margin-top: 1px;
    position: relative;
  }
  .node__todo__box svg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    overflow: visible;
  }
  .node__todo__txt {
    flex: 1 1 auto;
    position: relative;
    padding: 0 2px;
  }
  /* Strikethrough for checked todos, drawn as a freehand line */
  .node__todo--done .node__todo__txt {
    color: var(--ink-muted);
  }
  .node__todo__strike {
    position: absolute;
    left: -2px; right: -2px;
    top: 50%;
    height: 8px;
    transform: translateY(-50%);
    overflow: visible;
    pointer-events: none;
    opacity: 0;
  }
  .node__todo--done .node__todo__strike { opacity: 1; }
  .node__todo:hover .node__todo__box svg { transform: scale(1.08); transition: transform 120ms; }

  /* Prompt — dashed rough rectangle */
  .prompt {
    position: relative;
    width: 92%; max-width: 420px;
    padding: 16px 22px;
    background: transparent;
    border: 0;
    text-align: left;
    cursor: pointer;
    font-family: "Kalam", cursive;
    transform: rotate(var(--rot, 0deg));
    transition: transform 160ms;
  }
  .prompt:hover { transform: rotate(var(--rot, 0deg)) translateY(-1px); }
  .prompt__shape {
    position: absolute; inset: 0;
    pointer-events: none; z-index: 0; overflow: visible;
  }
  .prompt__inner { position: relative; z-index: 1; }
  .prompt__eyebrow {
    font-family: "Kalam", cursive;
    font-size: 13px;
    color: var(--ink-red);
    font-style: italic;
    margin-bottom: 4px;
  }
  .prompt__title {
    font-family: "Caveat", cursive;
    font-weight: 700;
    font-size: 24px;
    color: var(--ink-navy);
    line-height: 1.1;
  }
  .prompt__cta {
    margin-top: 6px;
    font-family: "Kalam", cursive;
    font-size: 14px;
    color: var(--ink-red);
    font-style: italic;
  }

  /* Choices — notebook list with checkboxes */
  .choices {
    position: relative;
    width: 94%; max-width: 460px;
    padding: 18px 22px 20px;
    background: transparent;
    transform: rotate(var(--rot, 0deg));
    opacity: 1;
    animation: choices-in 300ms cubic-bezier(.2,.7,.2,1);
  }
  .choices__shape {
    position: absolute; inset: 0;
    pointer-events: none; z-index: 0; overflow: visible;
  }
  .choices__inner { position: relative; z-index: 1; }
  @keyframes choices-in { from { opacity: 0; transform: translateY(-4px) rotate(var(--rot, 0deg)); } to { opacity: 1; transform: rotate(var(--rot, 0deg)); } }
  .choices__hd {
    font-family: "Caveat", cursive;
    font-weight: 700;
    font-size: 22px;
    color: var(--ink-red);
    margin-bottom: 12px;
    display: flex; justify-content: space-between; align-items: flex-end;
    position: relative;
    line-height: 1;
    white-space: nowrap;
  }
  .choices__hd-underline {
    position: absolute;
    left: 0; bottom: -6px;
    width: 130px; height: 14px;
    pointer-events: none;
    overflow: visible;
  }
  .choices__close {
    background: none; border: 0;
    font-family: "Caveat", cursive;
    color: var(--ink-muted);
    font-size: 26px; line-height: 1;
    cursor: pointer; padding: 0;
    width: 28px; height: 28px;
    position: relative;
  }
  .choices__close svg { position: absolute; inset: 0; overflow: visible; }
  .choice {
    position: relative;
    display: flex; align-items: flex-start; gap: 12px;
    padding: 8px 10px 8px 0;
    background: transparent;
    border: 0;
    text-align: left;
    cursor: pointer;
    font-family: "Kalam", cursive;
    font-size: 17px;
    font-weight: 400;
    color: var(--ink-navy);
    line-height: 1.4;
    width: 100%;
    transition: transform 140ms;
  }
  .choice:hover { transform: translateX(2px); }
  .choice__box {
    flex: 0 0 auto;
    width: 22px; height: 22px;
    position: relative;
    margin-top: 2px;
  }
  .choice__box svg { position: absolute; inset: 0; overflow: visible; }
  .choice__text { flex: 1; position: relative; }
  .choice__highlight {
    position: absolute;
    inset: -2px -6px;
    pointer-events: none;
    z-index: -1;
    overflow: visible;
    opacity: 0;
    transition: opacity 160ms;
  }
  .choice:hover .choice__highlight { opacity: 1; }
  .choice.is-selected .choice__highlight { opacity: 1; }
  .choice.is-selected .choice__text { font-weight: 700; }

  /* Details Panel */
  .panel__empty {
    height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 50px 40px; text-align: center;
    gap: 16px;
    font-family: "Kalam", cursive;
  }
  .panel__empty__arrow {
    width: 80px; height: 80px;
    opacity: 0.6;
    color: var(--ink-red);
    overflow: visible;
  }
  .panel__empty__ttl {
    font-family: "Caveat", cursive;
    font-weight: 700;
    font-size: 32px;
    color: var(--ink-navy);
    line-height: 1.1;
  }
  .panel__empty__sub {
    font-size: 16px; max-width: 28ch;
    color: var(--ink-muted);
    font-style: italic;
  }

  .panel {
    padding: 32px 40px 40px;
    animation: panel-in 300ms cubic-bezier(.2,.7,.2,1);
    font-family: "Kalam", cursive;
  }
  @keyframes panel-in { from { opacity: 0; transform: translateX(8px); } to { opacity: 1; transform: none; } }
  .panel__kicker {
    font-family: "Kalam", cursive;
    font-size: 14px;
    color: var(--ink-red);
    font-style: italic;
    margin-bottom: 6px;
  }
  .panel__ttl {
    font-family: "Caveat", cursive;
    font-weight: 700;
    font-size: 38px;
    color: var(--ink-navy);
    line-height: 1.05;
    margin-bottom: 6px;
    position: relative;
    display: inline-block;
    padding-bottom: 8px;
  }
  .panel__ttl-underline {
    position: absolute;
    left: 0; right: 0; bottom: -4px;
    height: 14px;
    pointer-events: none;
    overflow: visible;
  }
  .panel__meta {
    display: flex; flex-direction: column; gap: 8px;
    margin: 18px 0 22px;
    padding: 14px 16px 14px 18px;
    background: rgba(253, 245, 220, 0.55);
    border-left: 3px solid var(--ink-red);
    border-radius: 2px;
    position: relative;
  }
  .panel__meta-row {
    display: flex; align-items: flex-start; gap: 10px;
    font-family: "Kalam", cursive;
    font-size: 15px;
    color: var(--ink-black);
    line-height: 1.35;
  }
  .panel__meta-row__icon {
    flex: 0 0 auto;
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px;
    font-size: 14px;
    line-height: 1;
  }
  .panel__meta-row__lbl {
    font-family: "Caveat", cursive;
    font-weight: 700;
    color: var(--ink-red);
    font-size: 17px;
    margin-right: 2px;
    white-space: nowrap;
  }
  .panel__meta-row__val {
    color: var(--ink-navy);
    flex: 1 1 auto;
  }
  .panel__meta-row--urgent .panel__meta-row__val {
    color: var(--ink-red);
    font-weight: 700;
  }
  .panel__sect { margin-bottom: 22px; }
  .panel__sect__lbl {
    font-family: "Caveat", cursive;
    font-weight: 700;
    font-size: 22px;
    color: var(--ink-red);
    margin-bottom: 8px;
    line-height: 1;
    display: inline-block;
    position: relative;
  }
  .panel__why {
    font-family: "Kalam", cursive;
    font-size: 17px;
    color: var(--ink-black);
    line-height: 1.55;
    padding: 4px 0;
    position: relative;
  }
  .panel__why::before {
    content: "";
    position: absolute;
    left: -14px; top: 4px; bottom: 4px;
    width: 2px;
    background: var(--ink-red);
    opacity: 0.5;
  }
  .panel__body {
    font-family: "Kalam", cursive;
    font-size: 16px;
    line-height: 1.6;
    color: var(--ink-black);
  }
  .panel__cites { display: flex; flex-direction: column; gap: 8px; }
  .panel__cite {
    display: flex; align-items: flex-start; gap: 10px;
    font-family: "Kalam", cursive;
    font-size: 14px;
    line-height: 1.5;
    padding: 4px 0;
  }
  .panel__cite__sup {
    font-family: "Caveat", cursive;
    font-weight: 700;
    color: var(--ink-red);
    flex: 0 0 auto;
    min-width: 20px;
    font-size: 18px;
    line-height: 1;
    margin-top: 2px;
  }
  .panel__cite__body { color: var(--ink-black); }
  .panel__cite__body strong { color: var(--ink-navy); font-weight: 700; }
  .panel__cite__body a { color: var(--ink-navy); text-decoration: underline; text-decoration-color: var(--ink-red); text-underline-offset: 3px; }
  .panel__cite__body a:hover { color: var(--ink-red); }

  .panel__actions { display: flex; gap: 16px; margin-top: 28px; }
  .btn {
    flex: 1;
    padding: 10px 18px;
    background: transparent;
    border: 0;
    font-family: "Caveat", cursive;
    font-weight: 700;
    font-size: 22px;
    color: var(--ink-navy);
    cursor: pointer;
    position: relative;
    line-height: 1;
    transform: rotate(var(--rot, 0deg));
    transition: transform 140ms;
  }
  .btn:hover { transform: rotate(var(--rot, 0deg)) translateY(-1px); }
  .btn__shape {
    position: absolute; inset: 0;
    pointer-events: none; z-index: 0; overflow: visible;
  }
  .btn__label { position: relative; z-index: 1; }
  .btn--primary .btn__label { color: var(--ink-red); }
  .btn--ghost .btn__label { color: var(--ink-muted); }

  .reopen-warn {
    margin-top: 14px;
    font-family: "Kalam", cursive;
    font-size: 14px;
    color: var(--ink-red);
    font-style: italic;
    padding: 8px 0 8px 16px;
    border-left: 2px solid var(--ink-red);
  }

  /* Draw-on animation for SVG paths */
  .rough-draw path {
    stroke-dasharray: 800;
    stroke-dashoffset: 800;
    animation: draw-on 500ms ease-out forwards;
  }
  .rough-draw path:nth-child(2) { animation-delay: 80ms; }
  .rough-draw path:nth-child(3) { animation-delay: 160ms; }
  .rough-draw path:nth-child(4) { animation-delay: 240ms; }
  @keyframes draw-on {
    to { stroke-dashoffset: 0; }
  }

  /* ===========================
     Sticky note — Lock-in marker
     =========================== */
  .sticky {
    position: absolute;
    width: 196px;
    min-height: 168px;
    padding: 26px 18px 20px;
    background: #fef3a2;
    color: #1e3a5f;
    font-family: "Kalam", cursive;
    font-weight: 700;
    font-size: 17px;
    line-height: 1.35;
    text-align: center;
    opacity: 1;
    box-shadow:
      0 10px 24px -8px rgba(60, 45, 20, 0.28),
      0 6px 12px -4px rgba(60, 45, 20, 0.18),
      0 2px 4px rgba(60, 45, 20, 0.10),
      /* inner top-left "lifted" highlight */
      inset 2px 2px 6px rgba(255, 255, 255, 0.35),
      /* inner bottom-right gradient darkening for 3D feel */
      inset -6px -8px 14px -8px rgba(180, 150, 60, 0.22);
    /* rotation via --note-rot custom prop; mounted once per sticky */
    transform: rotate(var(--note-rot, 0deg));
    z-index: 5;
    pointer-events: none;
    /* Paper grain: inline SVG noise at ~8% */
    background-image:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.2 0 0 0 0 0.15 0 0 0 0 0.05 0 0 0 0.08 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    background-size: 140px 140px;
    background-blend-mode: multiply;
  }
  /* Tape strip across top */
  .sticky::before {
    content: "";
    position: absolute;
    left: 50%;
    top: -12px;
    width: 88px;
    height: 26px;
    transform: translateX(-50%) rotate(var(--tape-rot, -2deg));
    background:
      linear-gradient(180deg,
        rgba(255,255,255,0.38) 0%,
        rgba(255,255,255,0.62) 40%,
        rgba(245,240,220,0.55) 100%);
    border-top: 1px solid rgba(255,255,255,0.5);
    border-bottom: 1px solid rgba(180,170,140,0.25);
    box-shadow:
      0 2px 3px rgba(60,45,20,0.18),
      inset 0 0 0 0.5px rgba(255,255,255,0.3);
    /* torn edges */
    mask-image: linear-gradient(90deg, transparent 0, #000 5px, #000 calc(100% - 5px), transparent 100%);
    -webkit-mask-image: linear-gradient(90deg, transparent 0, #000 5px, #000 calc(100% - 5px), transparent 100%);
    pointer-events: none;
    z-index: 2;
  }
  /* Bottom-right corner curl */
  .sticky::after {
    content: "";
    position: absolute;
    right: -1px; bottom: -1px;
    width: 32px; height: 32px;
    background:
      radial-gradient(
        circle at 0% 0%,
        rgba(0,0,0,0) 58%,
        rgba(60,45,20,0.12) 70%,
        rgba(60,45,20,0.28) 85%,
        rgba(0,0,0,0) 100%
      ),
      linear-gradient(
        135deg,
        rgba(254,243,162,0) 48%,
        #fbe87f 50%,
        #e8c955 85%,
        #b8991f 100%
      );
    clip-path: polygon(100% 0, 100% 100%, 0 100%);
    pointer-events: none;
    z-index: 1;
  }
  /* Text layer — masked reveal during the "write" phase */
  .sticky__txt {
    position: relative;
    display: block;
    /* during write-on, this mask goes 0→100% */
    -webkit-mask-image: linear-gradient(90deg, #000 var(--write, 100%), transparent var(--write, 100%));
            mask-image: linear-gradient(90deg, #000 var(--write, 100%), transparent var(--write, 100%));
    color: #1e3a5f;
  }
  .sticky__kicker {
    display: block;
    font-family: "Caveat", cursive;
    font-weight: 700;
    font-size: 18px;
    color: #c94c3a;
    line-height: 1;
    margin-bottom: 8px;
    letter-spacing: 0.02em;
  }
  .sticky__signed {
    display: block;
    margin-top: 10px;
    font-family: "Caveat", cursive;
    font-weight: 700;
    font-size: 20px;
    color: #c94c3a;
    transform: rotate(-3deg);
    opacity: var(--signed-opacity, 0);
    transition: opacity 220ms ease-out;
  }

  /* Animation sequence:
     1) enter 0→450ms: drop from -60px, scale 1.08→1, opacity 0→1, overshoot
     2) 450→530ms: 2° wobble on landing
     3) 530→730ms: pause
     4) 730→1130ms: write-on (mask reveal 0→100%) + signed fades in
  */
  .sticky--dropping {
    animation:
      sticky-drop 450ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
      sticky-wobble 80ms ease-in-out 450ms 1;
  }
  .sticky--dropping .sticky__txt {
    animation: sticky-write 400ms ease-out 730ms forwards;
  }
  .sticky--dropping .sticky__signed {
    animation: sticky-sign 220ms ease-out 980ms forwards;
  }
  /* Safety: if the drop animation doesn't run (tab throttled, iframe
     paused, etc), the sticky still renders at its settled state. */
  .sticky {
    animation-fill-mode: forwards;
  }
  .sticky:not(.sticky--dropping) .sticky__txt { --write: 100%; }
  .sticky:not(.sticky--dropping) .sticky__signed { opacity: 1; }
  @keyframes sticky-drop {
    0%   { transform: translateY(-60px) rotate(var(--note-rot, 0deg)) scale(1.08); opacity: 0.2; }
    60%  { opacity: 1; }
    100% { transform: translateY(0) rotate(var(--note-rot, 0deg)) scale(1); opacity: 1; }
  }
  @keyframes sticky-wobble {
    0%   { transform: translateY(0) rotate(calc(var(--note-rot, 0deg) + 2deg)) scale(1); }
    100% { transform: translateY(0) rotate(var(--note-rot, 0deg)) scale(1); }
  }
  @keyframes sticky-write {
    from { --write: 0%; }
    to   { --write: 100%; }
  }
  /* fallback for browsers that don't animate custom props */
  @property --write {
    syntax: '<percentage>';
    inherits: false;
    initial-value: 100%;
  }
  @keyframes sticky-sign {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* Resting state: masked text fully visible, signed visible */
  .sticky:not(.sticky--dropping) .sticky__txt { --write: 100%; }
  .sticky:not(.sticky--dropping) .sticky__signed { --signed-opacity: 1; }

  @media (prefers-reduced-motion: reduce) {
    .sticky--dropping {
      animation: sticky-fade 280ms ease-out forwards;
    }
    .sticky--dropping .sticky__txt {
      animation: none;
      --write: 100%;
    }
    .sticky--dropping .sticky__signed {
      animation: none;
      opacity: 1;
    }
    @keyframes sticky-fade {
      from { opacity: 0; transform: rotate(var(--note-rot, 0deg)) scale(1); }
      to   { opacity: 1; transform: rotate(var(--note-rot, 0deg)) scale(1); }
    }
  }
  /* ============================================================
     RIGHT-PAGE STICKY BOARD — default panel view
     ============================================================ */
  .board {
    padding: 28px 36px 40px;
    position: relative;
  }
  .board__hd { margin-bottom: 22px; }
  .board__ttl {
    position: relative;
    display: inline-block;
    font-family: "Caveat", cursive;
    font-weight: 700;
    font-size: 38px;
    color: var(--ink-navy);
    line-height: 1.1;
    padding-bottom: 6px;
  }
  .board__sub {
    margin-top: 10px;
    color: var(--ink-muted);
    font-size: 17px;
    font-style: italic;
  }
  .board__slots {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 22px 18px;
    margin-bottom: 20px;
  }
  .board__slot {
    position: relative;
    min-height: 148px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 6px;
  }
  .board__slot--empty,
  .board__slot--retired {
    color: var(--ink-muted);
    font-family: "Caveat", cursive;
    border-radius: 6px;
    min-height: 130px;
  }
  .board__slot--empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    opacity: 0.55;
  }
  .board__slot__num {
    font-size: 32px;
    font-weight: 700;
    color: var(--ink-muted);
    line-height: 1;
  }
  .board__slot__lbl {
    font-size: 15px;
    color: var(--ink-muted);
    text-align: center;
    font-style: italic;
  }
  .board__slot--retired {
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.45;
  }
  .board__slot__rough { z-index: 0; }

  /* Sticky variant for the board: smaller, no absolute positioning */
  .sticky--board {
    position: static;
    transform: rotate(var(--note-rot, 0deg));
    width: 100%;
    max-width: 220px;
    padding: 18px 16px 14px;
    font-size: 16px;
  }
  .sticky--board .sticky__txt { font-size: 17px; line-height: 1.25; }
  .sticky--board .sticky__kicker { font-size: 15px; }
  .sticky--board .sticky__signed { font-size: 17px; }

  /* Confirm button area */
  .board__confirm-wrap {
    margin-top: 10px;
    padding: 18px 14px 10px;
    border-top: 1px dashed var(--ink-muted);
    text-align: center;
  }
  .board__confirm-wrap--top {
    margin: 4px 0 22px;
    padding: 18px 18px 16px;
    background: rgba(244, 211, 94, 0.22);
    border: 1.5px dashed #b8991f;
    border-radius: 8px;
    text-align: center;
    position: relative;
  }
  .board__confirm-wrap--top::before {
    content: "★ ready to start executing";
    position: absolute;
    top: -11px;
    left: 50%;
    transform: translateX(-50%) rotate(-2deg);
    background: var(--paper);
    padding: 2px 12px;
    font-family: "Caveat", cursive;
    font-weight: 700;
    font-size: 16px;
    color: var(--ink-red);
    letter-spacing: 0.02em;
  }
  .board__confirm-wrap--top .btn--confirm {
    margin-bottom: 10px;
  }
  .board__confirm-note {
    font-family: "Kalam", cursive;
    font-size: 15px;
    color: var(--ink-muted);
    margin-bottom: 16px;
    line-height: 1.5;
    font-style: italic;
  }
  .board__confirm-wrap--top .board__confirm-note {
    margin-bottom: 0;
    margin-top: 10px;
  }
  .btn--confirm { font-size: 19px !important; padding: 14px 26px !important; }
  .board__exec-note {
    margin-top: 6px;
    padding: 14px 16px;
    background: rgba(244, 211, 94, 0.18);
    border-radius: 6px;
    font-family: "Kalam", cursive;
    font-size: 15px;
    color: var(--ink-black);
    line-height: 1.5;
    position: relative;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .board__exec-note__bullet {
    flex: 0 0 auto;
    color: #5dbe87;
    font-weight: 700;
    font-size: 20px;
    line-height: 1;
  }
  .board__done-note {
    margin-top: 10px;
    text-align: center;
    font-family: "Caveat", cursive;
    font-size: 26px;
    color: var(--ink-red);
  }

  /* ============================================================
     STICKY LANDED ON A CARD — after all stage's todos done
     ============================================================ */
  .node--locked .sticky--landed {
    position: absolute;
    top: -14px;
    right: -18px;
    width: 168px;
    padding: 14px 14px 12px;
    transform: rotate(var(--note-rot, 4deg));
    z-index: 3;
    font-size: 15px;
  }
  .node--locked .sticky--landed .sticky__txt { font-size: 15px; line-height: 1.2; }
  /* "done!" kicker lives BELOW the signature in landed stickies — oversized,
     red, handwritten stamp-feel. Replaces the old red-strike treatment. */
  .node--locked .sticky--landed .sticky__kicker--done {
    display: block;
    color: var(--ink-red);
    font-family: "Caveat", cursive;
    font-weight: 700;
    font-size: 34px;
    line-height: 1;
    margin: 8px 0 0;
    letter-spacing: 0.5px;
    transform: rotate(-6deg);
    transform-origin: left center;
  }
  .node--locked .sticky--landed .sticky__signed { font-size: 15px; margin-top: 6px; }
  .sticky__strike {
    position: absolute;
    left: -4px;
    right: -4px;
    top: 42%;
    width: calc(100% + 8px);
    height: 18px;
    overflow: visible;
    pointer-events: none;
  }
  .sticky--landed .sticky__txt--struck { position: relative; color: var(--ink-muted); }

  /* Landing animation: sticky flies in from upper-right and settles */
  @keyframes sticky-land {
    0%   { transform: translate(60px, -80px) rotate(calc(var(--note-rot, 4deg) + 12deg)) scale(1.15); opacity: 0; }
    40%  { opacity: 1; }
    70%  { transform: translate(0, 0) rotate(calc(var(--note-rot, 4deg) - 3deg)) scale(1.04); }
    100% { transform: translate(0, 0) rotate(var(--note-rot, 4deg)) scale(1); opacity: 1; }
  }
  .sticky--landing {
    animation: sticky-land 900ms cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
  }

  /* Row that has landed needs extra right-side clearance for overhang */
  .tl__row--landed { padding-right: 24px; }

  /* Done card gets a subtle dim and green-ish tint */
  .node--done {
    opacity: 0.88;
  }
  .node--done .node__status--done { color: #5dbe87; }

</style>
</head>
<body>

<div class="frame paper-bg">
  <div class="paper-vignette"></div>
  <button class="canvas__reset" id="reset-btn">↺ start over</button>
  <div class="split">
        <div class="split__list">
          <div class="tl" id="tl">
            <div class="tl__row">
              <div class="node node--root" style="--rot: -1deg;">

// ============================================================
// ONBOARDING BRIDGE — reads localStorage profile from onboarding.html
// ============================================================
function readOnboardingProfile() {
  try {
    const raw = localStorage.getItem('pathway.onboarding.v3');
    if (!raw) throw new Error('missing');
    const parsed = JSON.parse(raw);
    if (!parsed || typeof parsed !== 'object') throw new Error('invalid');
    return parsed;
  } catch (_) {
    return { name: 'Maya', year: 'Freshman', majorStatus: 'Declared · CS', interests: ['AI / ML'], background: ['First-gen'], hoursPerWeek: 8, why: '' };
  }
}

function composeIntakeProfile(answers) {
  return {
    year: { 'Freshman': 'freshman', 'Sophomore': 'sophomore', 'Junior': 'junior', 'Senior': 'senior', 'Grad': 'grad' }[answers.year],
    major_category: { 'Declared · CS': 'stem', 'Declared · other STEM': 'stem', 'Declared · non-STEM': 'humanities', 'Undeclared': 'undeclared', 'Exploring': 'undeclared' }[answers.majorStatus] ?? 'undeclared',
    first_gen: (answers.background || []).includes('First-gen'),
    aid_status: 'none',
    hours_per_week: Number(answers.hoursPerWeek ?? 8),
    interests: (answers.interests || []).slice(0, 3),
    mode: (answers.majorStatus === 'Undeclared' || answers.majorStatus === 'Exploring') ? 'discovery' : ((answers.why || '').trim() ? 'directed' : 'partial'),
    end_goal: (answers.why || '').trim().slice(0, 300) || undefined,
    background: Array.isArray(answers.background) ? answers.background : [],
    name: (answers.name || '').trim() || undefined,
  };
}

async function fetchOptionsForStage(stageIdx, parentPathTag, pathTrace) {
  const stage_keys = ['direction', 'community', 'signal', 'summer', 'capstone'];
  const profile = composeIntakeProfile(readOnboardingProfile());
  const reqBody = {
    profile,
    stage_key: stage_keys[stageIdx],
    parent_path_tag: parentPathTag ?? null,
    parent_id: pathTrace?.[pathTrace.length - 1]?.id ?? null,
    path_trace: pathTrace || [],
    requestId: 'pw-' + Date.now(),
  };
  try {
    const r = await fetch('/api/expand-node', {
      method: 'POST', headers: { 'content-type': 'application/json' },
      body: JSON.stringify(reqBody),
    });
    const j = await r.json();
    if (!j.ok) throw new Error('api not ok');
    return j.children.map((n, i) => ({
      id: n.id,
      pathTag: n.path_tag,
      title: n.title,
      eyebrow: n.eyebrow,
      when: n.why_now || '',
      effort: n.estimated_time_cost,
      deadline: (n.todos?.[0]?.text) || 'Rolling',
      why: n.why_this,
      body: n.description,
      cites: (n.cites || []).map((c, idx) => [String(idx + 1), c.label, `<a href="${c.url}" target="_blank" rel="noopener noreferrer">${new URL(c.url).host}</a> — ${c.summary}`]),
    }));
  } catch (e) {
    console.warn('[pathway] api failed, falling back to static', e);
    return null;
  }
}
